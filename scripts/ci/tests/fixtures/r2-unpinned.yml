name: unpinned
on: [push]
permissions:
  contents: read
jobs:
  a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4                                          # tag — R2 must flag
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a    # SHA — must NOT flag
      - uses: ./.github/actions/local                                      # local — must NOT flag
