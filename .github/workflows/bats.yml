name: Bats

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: Bats test suite (scripts/tests)
    runs-on: ubuntu-latest
    steps:
      # Phase 21 Plan 21-b (HARD-05 / WR-04): first-time-in-repo bats CI.
      # SHA-pin mirrors validate.yml per ADR-int-04 (tag-pin alone forbidden).
      # actions/checkout v4.2.2 -> 11bd71901bbe5b1630ceea73d27597364c9af683
      # (verified 2026-05-03).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 (resolved 2026-05-03)

      - name: Install bats + yq
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats yq
          bats --version
          yq --version

      - name: Run bats scripts/tests/*.bats
        shell: bash
        run: |
          bats scripts/tests/*.bats
