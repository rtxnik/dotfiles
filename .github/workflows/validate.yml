name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scripts:
    name: Shell syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on all scripts
        shell: bash
        run: |
          fail=0
          while IFS= read -r f; do
            if bash -n "$f"; then
              echo "OK: $f"
            else
              echo "FAIL: $f"
              fail=1
            fi
          done < <(find . -type f \( -name '*.sh' -o -path '*/scripts/*' -o -name 'setup' \) | grep -v node_modules)
          exit $fail

      - name: shellcheck (advisory)
        continue-on-error: true
        run: |
          find . -type f \( -name '*.sh' -o -path '*/scripts/*' -o -name 'setup' \) | grep -v node_modules | \
            xargs shellcheck --severity=warning || true

  chezmoi:
    name: chezmoi dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: chezmoi apply --dry-run
        run: |
          chezmoi init --source "$PWD"
          chezmoi apply --dry-run --source "$PWD" || true
