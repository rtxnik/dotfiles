name: workflow-security
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    name: workflow-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install yq (mikefarah v4, SHA-pinned)
        uses: ./.github/actions/setup-yq
      - name: Validate workflow security (A5)
        run: bash scripts/ci/validate-workflow-security.sh
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: zizmor (workflow-security depth — second hard gate)
        run: uvx zizmor@1.25.2 --offline --persona regular .github/workflows/ .github/actions/
